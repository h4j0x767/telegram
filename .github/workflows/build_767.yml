name: Build 767 Telegram Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up dependencies (ldid, dpkg)
      run: |
        brew install ldid dpkg
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        curl -LO https://github.com/theos/sdks/archive/master.tar.gz
        tar -xf master.tar.gz -C $THEOS/sdks --strip-components=1
        rm master.tar.gz

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        # Extract dylib
        dpkg-deb -x packages/*.deb tmp_deb
        cp tmp_deb/Library/MobileSubstrate/DynamicLibraries/767Telegram.dylib .

    - name: Upload Dylib
      uses: actions/upload-artifact@v4
      with:
        name: 767-Telegram-Dylib
        path: |
          767Telegram.dylib
          packages/*.deb
