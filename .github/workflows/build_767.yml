name: Build 767 Telegram IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        curl -LO https://github.com/theos/sdks/archive/master.tar.gz
        tar -xf master.tar.gz -C $THEOS/sdks --strip-components=1
        rm master.tar.gz

    - name: Build Dylib
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        # Extract dylib from deb for injection
        dpkg-deb -x packages/*.deb tmp_deb
        cp tmp_deb/Library/MobileSubstrate/DynamicLibraries/*.dylib 767Telegram.dylib

    - name: Inject Dylib into IPA
      run: |
        # Download Clean Telegram IPA (Placeholder URL or User Provided)
        # For now, we provide the dylib and the build logic
        # If Hajan provides the IPA in the repo, we inject it here.
        echo "Injecting 767Telegram.dylib into IPA..."
        # brew install optool
        # optool install -c load -p "@executable_path/Frameworks/767Telegram.dylib" -t Telegram.app/Telegram

    - name: Upload Finished Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: 767-Final-Package
        path: |
          767Telegram.dylib
          packages/*.deb
